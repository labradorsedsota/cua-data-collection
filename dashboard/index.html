<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BugHunt Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--blue:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;--orange:#db6d28}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:16px}
header{display:flex;justify-content:space-between;align-items:center;padding:16px 0 12px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px;position:sticky;top:0;background:var(--bg);z-index:100}
header h1{font-size:24px;font-weight:600}
header h1 span{color:var(--blue)}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.last-updated{color:var(--text2);font-size:13px}
.btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:13px;transition:background .15s}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{opacity:.9}

/* Stats Cards */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center}
.stat-card .number{font-size:32px;font-weight:700;line-height:1.2}
.stat-card .label{font-size:13px;color:var(--text2);margin-top:4px}
.stat-card .pct{font-size:12px;color:var(--text2)}

/* Worker Cards */
.section-title{font-size:18px;font-weight:600;margin-bottom:12px;padding-top:8px}
.workers{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:24px}
.worker-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.worker-card .name{font-weight:600;font-size:14px;margin-bottom:8px}
.worker-card .meta{font-size:12px;color:var(--text2);line-height:1.8}
.worker-card .bar{height:4px;background:var(--surface2);border-radius:2px;margin-top:8px;overflow:hidden}
.worker-card .bar-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:0;flex-wrap:wrap;align-items:center;position:sticky;top:54px;background:var(--bg);z-index:90;padding:12px 0;border-bottom:1px solid var(--border)}
.filters input,.filters select{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;outline:none}
.filters input:focus,.filters select:focus{border-color:var(--blue)}
.filters input{min-width:200px}

/* Table */
.table-wrap{border:1px solid var(--border);border-radius:10px;background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.5px;cursor:pointer;user-select:none;white-space:nowrap;position:sticky;top:98px;background:var(--surface);z-index:80}
th:hover{color:var(--text)}
th .sort-arrow{margin-left:4px;opacity:.4}
th.sorted .sort-arrow{opacity:1}
td{padding:10px 14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:nth-child(even){background:rgba(255,255,255,.02)}
tr:hover{background:rgba(255,255,255,.04)}

/* Badges */
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:500;white-space:nowrap}
.badge-pending{background:rgba(139,148,158,.15);color:var(--text2)}
.badge-assigned{background:rgba(88,166,255,.15);color:var(--blue)}
.badge-running{background:rgba(210,153,34,.15);color:var(--yellow)}
.badge-completed{background:rgba(63,185,80,.15);color:var(--green)}
.badge-failed{background:rgba(248,81,73,.15);color:var(--red)}
.badge-blocked{background:rgba(188,140,255,.15);color:var(--purple)}
.badge-abnormal{background:rgba(248,81,73,.12);color:var(--red)}
.badge-normal{background:rgba(63,185,80,.12);color:var(--green)}
.badge-unclear{background:rgba(210,153,34,.12);color:var(--yellow)}
.mono{font-family:'SF Mono',SFMono-Regular,Consolas,monospace;font-size:12px}
.text-muted{color:var(--text2)}
.truncate{max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--text2)}
.error-msg{text-align:center;padding:40px;color:var(--red);background:rgba(248,81,73,.1);border-radius:10px;margin:20px 0}

/* Responsive */
@media(max-width:768px){
  .container{padding:10px}
  header h1{font-size:18px}
  .stats{grid-template-columns:repeat(3,1fr)}
  .stat-card .number{font-size:22px}
  .workers{grid-template-columns:repeat(2,1fr)}
  table{font-size:12px}
  th,td{padding:8px 10px}
  .truncate{max-width:150px}
}
@media(max-width:480px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .workers{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🐛 <span>BugHunt</span> 任务看板</h1>
    <div class="header-right">
      <span class="last-updated" id="lastUpdated">加载中...</span>
      <button class="btn" onclick="loadData()">🔄 刷新</button>
    </div>
  </header>

  <div class="stats" id="stats"></div>

  <div class="section-title">👷 Worker 概览</div>
  <div class="workers" id="workers"></div>

  <div class="section-title">📋 任务列表</div>
  <div class="filters">
    <input type="text" id="search" placeholder="🔍 搜索 task_id..." oninput="renderTable()">
    <input type="text" id="searchSess" placeholder="🔍 搜索 Session ID..." oninput="renderTable()">
    <select id="filterSess" onchange="renderTable()">
      <option value="">全部 Session</option>
      <option value="has">有 Session</option>
      <option value="none">无 Session</option>
    </select>
    <select id="filterStatus" onchange="renderTable()">
      <option value="">全部状态</option>
      <option value="pending">待分配</option>
      <option value="assigned">已分配</option>
      <option value="running">执行中</option>
      <option value="completed">已完成</option>
      <option value="failed">失败</option>
      <option value="blocked">阻塞</option>
    </select>
    <select id="filterWorker" onchange="renderTable()">
      <option value="">全部 Worker</option>
    </select>
    <select id="filterResult" onchange="renderTable()">
      <option value="">全部结果</option>
      <option value="abnormal">异常(复现)</option>
      <option value="normal">正常(未复现)</option>
      <option value="unclear">不确定</option>
    </select>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('task_id')">Task ID <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('status')">状态 <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('worker')">Worker <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('result')">结果 <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('duration_seconds')">耗时 <span class="sort-arrow">↕</span></th>
          <th onclick="sortBy('sess_id')">Session <span class="sort-arrow">↕</span></th>
          <th>描述</th>
        </tr>
      </thead>
      <tbody id="taskTable"></tbody>
    </table>
  </div>
  <div style="text-align:center;padding:16px;color:var(--text2);font-size:12px" id="tableInfo"></div>
</div>

<script>
const REPO = 'labradorsedsota/bughunt';
const REFRESH_INTERVAL = 60000;

let allTasks = [];
let sortKey = 'task_id';
let sortAsc = true;

const STATUS_LABELS = {
  pending: '待分配', assigned: '已分配', running: '执行中',
  completed: '已完成', failed: '失败', blocked: '阻塞'
};
const RESULT_LABELS = { abnormal: '异常', normal: '正常', unclear: '不确定' };
const WORKERS = ['worker-01','worker-02','worker-03','worker-04','worker-05','worker-06','worker-07','worker-08','worker-09','worker-fabrice'];

let overallData = null;

async function fetchJson(filename) {
  // Try relative path first (GitHub Pages), then GitHub API fallback
  try {
    const r = await fetch(filename + '?t=' + Date.now());
    if (r.ok) return await r.json();
  } catch(e) {}
  const r = await fetch(`https://api.github.com/repos/${REPO}/contents/dashboard/${filename}`);
  if (!r.ok) throw new Error('API ' + r.status);
  const json = await r.json();
  return JSON.parse(atob(json.content));
}

async function loadData() {
  try {
    // 并行加载两个文件
    const [progressResult, overallResult] = await Promise.allSettled([
      fetchJson('progress.json'),
      fetchJson('overall.json'),
    ]);

    if (progressResult.status === 'fulfilled') {
      const data = progressResult.value;
      allTasks = data.tasks || [];
      document.getElementById('lastUpdated').textContent =
        '数据更新: ' + new Date(data.last_updated).toLocaleString('zh-CN');
    }

    if (overallResult.status === 'fulfilled') {
      overallData = overallResult.value;
    } else {
      overallData = null;
    }

    renderAll();
  } catch(e) {
    document.getElementById('lastUpdated').textContent = '⚠️ 加载失败: ' + e.message;
  }
}

function renderAll() {
  renderStats();
  renderWorkers();
  populateWorkerFilter();
  renderTable();
}

function renderStats() {
  let items;
  if (overallData && overallData.overall) {
    const o = overallData.overall;
    items = [
      { label: '总任务', value: o.total, color: 'var(--text)' },
      { label: '未分配', value: o.unassigned, color: 'var(--text2)' },
      { label: '已派发', value: o.dispatched, color: 'var(--blue)' },
      { label: '执行中', value: o.running, color: 'var(--yellow)' },
      { label: '已完成', value: o.completed, color: 'var(--green)' },
      { label: '失败', value: o.failed, color: 'var(--red)' },
    ];
  } else {
    // 降级：从 progress.json 统计（和以前一样）
    const counts = { total: allTasks.length, pending: 0, completed: 0, failed: 0 };
    allTasks.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });
    items = [
      { label: '总任务', value: counts.total, color: 'var(--text)' },
      { label: '待处理', value: counts.pending, color: 'var(--text2)' },
      { label: '已完成', value: counts.completed, color: 'var(--green)' },
      { label: '失败', value: counts.failed, color: 'var(--red)' },
    ];
  }

  const total = items[0].value || 1;
  document.getElementById('stats').innerHTML = items.map(i => `
    <div class="stat-card">
      <div class="number" style="color:${i.color}">${i.value}</div>
      <div class="label">${i.label}</div>
      ${i.label !== '总任务' ? `<div class="pct">${(i.value/total*100).toFixed(1)}%</div>` : ''}
    </div>
  `).join('');
}

function renderWorkers() {
  const wStats = {};
  WORKERS.forEach(w => { wStats[w] = { total: 0, completed: 0, failed: 0, totalTime: 0, timeCount: 0 }; });
  allTasks.forEach(t => {
    if (t.worker && wStats[t.worker]) {
      wStats[t.worker].total++;
      if (t.status === 'completed') wStats[t.worker].completed++;
      if (t.status === 'failed' || t.status === 'blocked') wStats[t.worker].failed++;
      if (t.duration_seconds) { wStats[t.worker].totalTime += t.duration_seconds; wStats[t.worker].timeCount++; }
    }
  });

  const activeWorkers = WORKERS.filter(w => wStats[w].total > 0);
  if (activeWorkers.length === 0) {
    document.getElementById('workers').innerHTML = '<div style="color:var(--text2);padding:12px">暂无 Worker 活动</div>';
    return;
  }

  document.getElementById('workers').innerHTML = activeWorkers.map(w => {
    const s = wStats[w];
    const pct = s.total ? (s.completed / s.total * 100).toFixed(0) : 0;
    const avg = s.timeCount ? formatDuration(s.totalTime / s.timeCount) : '-';
    const rate = s.total ? (s.completed / s.total * 100).toFixed(0) + '%' : '-';
    return `
      <div class="worker-card">
        <div class="name">🤖 ${w}</div>
        <div class="meta">
          完成: ${s.completed} / ${s.total}<br>
          成功率: ${rate}<br>
          平均耗时: ${avg}
        </div>
        <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  }).join('');
}

function populateWorkerFilter() {
  const sel = document.getElementById('filterWorker');
  const current = sel.value;
  const workers = [...new Set(allTasks.map(t => t.worker).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">全部 Worker</option>' +
    workers.map(w => `<option value="${w}">${w}</option>`).join('');
  sel.value = current;
}

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const searchSess = document.getElementById('searchSess').value.toLowerCase();
  const filterSess = document.getElementById('filterSess').value;
  const filterStatus = document.getElementById('filterStatus').value;
  const filterWorker = document.getElementById('filterWorker').value;
  const filterResult = document.getElementById('filterResult').value;

  let filtered = allTasks.filter(t => {
    if (search && !t.task_id.toLowerCase().includes(search)) return false;
    if (searchSess && !(t.sess_id||'').toLowerCase().includes(searchSess)) return false;
    if (filterSess === 'has' && (!t.sess_id || t.sess_id === 'None')) return false;
    if (filterSess === 'none' && t.sess_id && t.sess_id !== 'None') return false;
    if (filterStatus && t.status !== filterStatus) return false;
    if (filterWorker && t.worker !== filterWorker) return false;
    if (filterResult && t.result !== filterResult) return false;
    return true;
  });

  filtered.sort((a, b) => {
    let va = a[sortKey] ?? '', vb = b[sortKey] ?? '';
    if (typeof va === 'number' && typeof vb === 'number') return sortAsc ? va - vb : vb - va;
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });

  const tbody = document.getElementById('taskTable');
  tbody.innerHTML = filtered.map(t => `
    <tr>
      <td class="mono">${t.task_id}</td>
      <td><span class="badge badge-${t.status}">${STATUS_LABELS[t.status] || t.status}</span></td>
      <td class="text-muted">${t.worker || '-'}</td>
      <td>${t.result ? `<span class="badge badge-${t.result}">${RESULT_LABELS[t.result] || t.result}</span>` : '-'}</td>
      <td class="mono">${t.duration_seconds ? formatDuration(t.duration_seconds) : '-'}</td>
      <td class="mono truncate" title="${escHtml(t.sess_id || '')}">${t.sess_id && t.sess_id !== 'None' ? escHtml(t.sess_id) : '-'}</td>
      <td class="truncate" title="${escHtml(t.test_description_zh || '')}">${escHtml(t.test_description_zh || '')}</td>
    </tr>
  `).join('');

  document.getElementById('tableInfo').textContent =
    `显示 ${filtered.length} / ${allTasks.length} 条任务`;
}

function sortBy(key) {
  if (sortKey === key) sortAsc = !sortAsc;
  else { sortKey = key; sortAsc = true; }
  renderTable();
}

function shortRepo(repo) { return repo ? repo.split('/').pop() : '-'; }
function formatDuration(s) {
  s = Math.round(s);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60), rs = s % 60;
  return m + 'm' + (rs ? rs + 's' : '');
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
loadData();
setInterval(loadData, REFRESH_INTERVAL);

// Dynamic sticky positioning
function updateStickyTops() {
  const header = document.querySelector('header');
  const filters = document.querySelector('.filters');
  if (!header || !filters) return;
  const hH = header.offsetHeight;
  const fH = filters.offsetHeight;
  filters.style.top = hH + 'px';
  document.querySelectorAll('th').forEach(th => { th.style.top = (hH + fH) + 'px'; });
}
window.addEventListener('load', updateStickyTops);
window.addEventListener('resize', updateStickyTops);
setTimeout(updateStickyTops, 500);
</script>
</body>
</html>
